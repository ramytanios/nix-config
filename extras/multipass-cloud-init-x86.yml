#cloud-config
#
#https://docs.cloud-init.io/en/latest/reference/examples.html#yaml-examples

hostname: multipass-guest-x86
users:
  - default
  - name: ramytanios
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
packages:
  - just
write_files:
- path: /etc/environment
  content: |
    TERM="xterm-256color"
  append: true
runcmd:
  - curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install --determinate --no-confirm
